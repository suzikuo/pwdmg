<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Password</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <h1>My Password</h1>
          <p id="siteHost">正在读取当前页面</p>
        </div>
        <span id="stateBadge" class="state-badge" data-state="checking">检测中</span>
      </header>

      <section class="status-panel" aria-live="polite">
        <p id="status">正在连接本地保险库...</p>
        <p id="matchInfo" class="match-info"></p>
      </section>

      <form id="unlockForm" class="unlock-form">
        <label for="password">主密码</label>
        <div class="password-row">
          <input id="password" type="password" placeholder="可留空" autocomplete="current-password" />
          <button id="unlockButton" type="submit">解锁</button>
        </div>
      </form>

      <div id="matchList" class="match-list" aria-label="当前网站匹配账号"></div>

      <footer class="popup-actions">
        <button id="refreshButton" class="secondary" type="button">刷新页面</button>
        <button id="lockButton" class="secondary danger" type="button">锁定</button>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
